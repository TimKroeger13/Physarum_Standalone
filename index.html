<!DOCTYPE html>
<html lang="de">

<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Physarum Netzplaner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap" rel="stylesheet">

  <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link rel="stylesheet" href="css/Structure.css">
  <link rel="stylesheet" href="css/Grafics.css">

  <script src="Map/Map.js"></script>
  <script src="StartUp.Js"></script>
  <script src="LoadData/LoadGeoJson.js"></script>
  <script src="Calculations/CalGeometry.js"></script>
  <script src="Map/AddRemoveFromMap.js"></script>
  <script src="Calculations/ConnectPoints.js"></script>
  <script src="Calculations/NewLineNetwork.js"></script>
  <script src="Calculations/NearestPoints.js"></script>
  <script src="Calculations/CalCompleteNetwork.js"></script>
  <script src="Calculations/CalEntireEntwork.js"></script>
  <script src="LoadData/ShowDataLoading.js"></script>
  <script src="Grafics/BarPlot.js"></script>
  <script src="Grafics/Slider.js"></script>
  <script src="LoadData/CsvLoading.js"></script>
  <script src="LoadData/LoadingMessages.js"></script>
</head>

<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <div class="Titel">
    <div class="titel-left">
      <span class="titel-icon" onclick="resetToInput()" title="Reset to input" style="cursor:pointer;">⬡</span>
      <span class="titel-text">Physarum Netzplaner</span>
      <span class="titel-sub">weighted network optimizer V.0.05</span>
    </div>
<div class="titel-right">
      <span class="titel-badge">PROTOTYP</span>
      <!-- Tile switcher -->
      <div class="tile-switcher">
        <button id="tileOsm"  class="btn btn-ghost active" onclick="switchTileLayer('osm')">OSM</button>
        <button id="tileDark" class="btn btn-ghost"        onclick="switchTileLayer('dark')">Voyager</button>
      </div>
      <!-- Collapse toggle -->
      <button id="collapseToggle" class="collapse-btn" onclick="toggleUICollapse()" title="Collapse panel (show map + slider only)">
        <span id="collapseIcon">▲</span>
      </button>
    </div>
  </div>

  <!-- ── Controls ────────────────────────────────────────── -->
  <div class="LoadData">
    <input type="file" id="fileInput" style="display:none;" accept=".geojson,.csv,.phy">

    <div class="btn-group">
      <button onclick="loadSourceData()"  type="button" class="btn btn-outline">
        <span class="btn-icon">⬤</span> Source
      </button>
      <button onclick="loadNetworkData()" type="button" class="btn btn-outline">
        <span class="btn-icon">─</span> Network
      </button>
      <button onclick="loadUserData()"    type="button" class="btn btn-outline">
        <span class="btn-icon">◆</span> Houses
      </button>
    </div>

    <div class="loader-sep"></div>

    <div class="btn-group">
      <button onclick="loadForcedData()" type="button" class="btn btn-forced">
        <span class="btn-icon">■</span> Forced
      </button>
    </div>

    <button onclick="calculate()" type="button" class="btn btn-primary">
      ▶ Calculate
    </button>

    <button onclick="modeldata()" type="button" class="btn btn-ghost">
      ⇥ Import Model
    </button>

    <div class="cutoff-control">
      <label for="heatCutoffInput">Cutoff</label>
      <input type="number" id="heatCutoffInput" value="1" min="0" step="0.1"
             onchange="window.heatCutoff = parseFloat(this.value)">
      <span class="cutoff-unit">kW</span>
    </div>
  </div>

  <!-- ── Loading state ───────────────────────────────────── -->
  <div class="InLoading">
    <div class="loading-pulse"></div>
    <h2 id="calPath">Calculating paths…</h2>
  </div>

  <!-- ── Chart panel ─────────────────────────────────────── -->
  <div class="BarPlot" id="chartPanel"></div>

  <!-- ── Slider row (with prev/next buttons) ─────────────── -->
  <div class="Slider">
    <button class="nav-btn" onclick="prevConnection()" title="Previous connection (←)">◀</button>
    <input type="range" id="slider" min="1" max="10" value="1">
    <button class="nav-btn" onclick="nextConnection()" title="Next connection (→)">▶</button>
  </div>

  <!-- ── Results bar ─────────────────────────────────────── -->
  <div class="Results">
    <div class="result-item">
      <button onclick="handleExportButtonClick()" type="button" class="btn btn-export">
        ↓ Export
      </button>
    </div>
    <div class="result-item">
      <span class="result-label">kWh/m</span>
      <span class="result-value" id="UsageProfit">—</span>
    </div>
    <div class="result-item">
      <span class="result-label">kWh total</span>
      <span class="result-value" id="UsageNum">—</span>
    </div>
    <div class="result-item">
      <span class="result-label">length</span>
      <span class="result-value" id="TotalLength">—</span>
    </div>
  </div>

  <!-- ── Resize handle ──────────────────────────────────── -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- ── Map ─────────────────────────────────────────────── -->
  <div class="DisplayData" id="map"></div>

  <script>
    window.heatCutoff = 1;
    document.getElementById('heatCutoffInput').addEventListener('change', function() {
      window.heatCutoff = parseFloat(this.value);
    });

    document.getElementById('slider').addEventListener('input', SliderMove);

    // ── Drag-to-resize: top panel vs map ────────────────────
    (function () {
      const handle = document.getElementById('resizeHandle');
      let dragging = false;

      handle.addEventListener('mousedown', function (event) {
        dragging = true;
        handle.classList.add('dragging');
        document.body.style.cursor      = 'ns-resize';
        document.body.style.userSelect  = 'none';
        event.preventDefault();
      });

      document.addEventListener('mousemove', function (event) {
        if (!dragging) return;

        const titleH   = document.querySelector('.Titel').offsetHeight;
        const sliderH  = document.querySelector('.Slider').offsetHeight;
        const resultsH = document.querySelector('.Results').offsetHeight;
        const handleH  = handle.offsetHeight;

        // Clamp mouse so charts never vanish and map never disappears
        const minY = titleH + sliderH + resultsH + 40;   // 40px min chart
        const maxY = window.innerHeight - handleH - 80;  // 80px min map
        const y    = Math.max(minY, Math.min(maxY, event.clientY));

        const newBarPlotH = y - titleH - sliderH - resultsH;
        const newMapH     = window.innerHeight - y - handleH;

        document.querySelector('.BarPlot').style.height     = newBarPlotH + 'px';
        document.querySelector('.DisplayData').style.height = newMapH     + 'px';
      });

      document.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor     = '';
        document.body.style.userSelect = '';

        // Redraw charts to fit their new pixel dimensions
        if (typeof _buildCharts === 'function' && _built) _buildCharts();
        // Let Leaflet recalculate the map canvas size
        if (window.map) window.map.invalidateSize();
      });
    })();

    // ── Collapse logic ──────────────────────────────────────
    let _uiCollapsed = false;

    function toggleUICollapse() {
      _uiCollapsed = !_uiCollapsed;
      document.body.classList.toggle('ui-collapsed', _uiCollapsed);
      document.getElementById('collapseIcon').textContent = _uiCollapsed ? '▼' : '▲';
      // Force Leaflet map to recalculate its size after layout changes
      setTimeout(() => { if (window.map) window.map.invalidateSize(); }, 320);
    }
  </script>

</body>
</html>
